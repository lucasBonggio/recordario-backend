
services:
  db:
    image: postgres:15
    platform: linux/amd64 
    container_name: recordario-db
    environment:
      POSTGRES_DB: recordario
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 15s
      timeout: 5s
      retries: 5
  
  app:
    platform: linux/amd64 
    build: .
    container_name: recordario-app
    ports: 
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/recordario
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
        db:
          condition: service_healthy
